global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "banko-api"
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
