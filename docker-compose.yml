# BANKO - Docker Compose (production-ready)
# Usage: docker compose up -d

services:
  traefik:
    image: traefik:v2.11
    container_name: banko-traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entrypoint=web"
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - banko-net
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: banko-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-banko_db}
      POSTGRES_USER: ${POSTGRES_USER:-banko}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banko123}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banko -d banko_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banko-net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: banko-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-banko}:${POSTGRES_PASSWORD:-banko123}@postgres:5432/${POSTGRES_DB:-banko_db}
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api-metrics.rule=Host(`localhost`) && Path(`/metrics`)"
      - "traefik.http.routers.api-metrics.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    networks:
      - banko-net
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: banko-frontend
    environment:
      PUBLIC_API_URL: http://localhost/api/v1
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    networks:
      - banko-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: banko-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banko-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: banko-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    networks:
      - banko-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: banko-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - banko-net
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  banko-net:
    driver: bridge
